name: Fetch Day-Ahead Energy Prices

on:
  schedule:
    # Data verschijnt bij EnergyZero gemiddeld om 17:30 CEST (15:30 UTC)
    # Data is volledig rond 20:15 CEST (18:15 UTC)
    # Eerste poging: 15:30 UTC (17:30 CEST)
    - cron: '30 15 * * *'
    # Retries elke 15 minuten tot 19:15 UTC (21:15 CEST)
    - cron: '45 15 * * *'
    - cron: '0 16 * * *'
    - cron: '15 16 * * *'
    - cron: '30 16 * * *'
    - cron: '45 16 * * *'
    - cron: '0 17 * * *'
    - cron: '15 17 * * *'
    - cron: '30 17 * * *'
    - cron: '45 17 * * *'
    - cron: '0 18 * * *'
    - cron: '15 18 * * *'
    - cron: '30 18 * * *'
    - cron: '45 18 * * *'
    - cron: '0 19 * * *'
    - cron: '15 19 * * *'
  workflow_dispatch:
    # Handmatig uitvoeren via GitHub UI

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check of prijzen voor morgen al aanwezig zijn
        id: check
        run: |
          python - <<'EOF'
          import json, sys, os
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo

          if not os.path.exists('dynamic_prices.json'):
              print("Bestand niet gevonden, ophalen vereist.")
              sys.exit(0)

          with open('dynamic_prices.json') as f:
              data = json.load(f)

          # Gebruik Amsterdam-tijdzone voor correcte "morgen"-bepaling
          amsterdam = ZoneInfo('Europe/Amsterdam')
          now_ams = datetime.now(amsterdam)
          tomorrow_ams_start = (now_ams + timedelta(days=1)).replace(
              hour=0, minute=0, second=0, microsecond=0)
          day_after_ams_start = (now_ams + timedelta(days=2)).replace(
              hour=0, minute=0, second=0, microsecond=0)
          tomorrow_start_utc = tomorrow_ams_start.astimezone(timezone.utc)
          tomorrow_end_utc   = day_after_ams_start.astimezone(timezone.utc)
          # Verwacht: 23 uur (lenteovergang), 24 uur (normaal), 25 uur (herfstovergang)
          expected_hours = int((tomorrow_end_utc - tomorrow_start_utc).total_seconds() // 3600)

          count = sum(
              1 for p in data.get('electricity', [])
              if tomorrow_start_utc
                 <= datetime.fromisoformat(p['time'].replace('Z', '+00:00'))
                 < tomorrow_end_utc
          )
          tomorrow_label = tomorrow_ams_start.strftime('%Y-%m-%d')
          if count >= expected_hours:
              print(f"Prijzen voor morgen ({tomorrow_label} Amsterdam) compleet ({count}/{expected_hours} uur). Stap over.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write("skip=true\n")
          else:
              print(f"Prijzen voor morgen ({tomorrow_label} Amsterdam) onvolledig: {count}/{expected_hours} uur. Ophalen vereist.")
          EOF

      - name: Prijzen ophalen van EnergyZero API
        if: steps.check.outputs.skip != 'true'
        run: python scripts/fetch_prices.py

      - name: Commit en push bijgewerkte prijzen
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "Deinion Saver Bot"
          git config user.email "deinion.saver@gmail.com"
          git diff --quiet dynamic_prices.json || (
            git add dynamic_prices.json &&
            git commit -m "chore: update dynamic prices [$(date -u +'%Y-%m-%d %H:%M') UTC]" &&
            git pull --rebase origin main &&
            git push
          )


