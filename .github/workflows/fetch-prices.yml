name: Fetch Day-Ahead Energy Prices

on:
  schedule:
    # Eerste poging: 13:15 UTC (day-ahead prijzen beschikbaar vanaf ~13:00 UTC)
    - cron: '15 13 * * *'
    # Retries elke 15 minuten tot 17:00 UTC
    - cron: '30 13 * * *'
    - cron: '45 13 * * *'
    - cron: '0 14 * * *'
    - cron: '15 14 * * *'
    - cron: '30 14 * * *'
    - cron: '45 14 * * *'
    - cron: '0 15 * * *'
    - cron: '15 15 * * *'
    - cron: '30 15 * * *'
    - cron: '45 15 * * *'
    - cron: '0 16 * * *'
    - cron: '15 16 * * *'
    - cron: '30 16 * * *'
    - cron: '45 16 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    # Handmatig uitvoeren via GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check of prijzen voor morgen al aanwezig zijn
        id: check
        run: |
          python - <<'EOF'
          import json, datetime, sys, os
          if not os.path.exists('dynamic_prices.json'):
              print("Bestand niet gevonden, ophalen vereist.")
              sys.exit(0)
          with open('dynamic_prices.json') as f:
              data = json.load(f)
          tomorrow = (datetime.datetime.utcnow() + datetime.timedelta(days=1)).strftime('%Y-%m-%d')
          count = sum(1 for p in data.get('electricity', []) if p['time'].startswith(tomorrow))
          if count >= 20 and False:  # TEST: skip uitgeschakeld
              print(f"Prijzen voor morgen al aanwezig ({count} punten). Stap over.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write("skip=true\n")
          else:
              print(f"Onvoldoende prijzen voor morgen ({count} punten). Ophalen vereist.")
          EOF

      - name: Prijzen ophalen van EnergyZero API
        if: steps.check.outputs.skip != 'true'
        run: python scripts/fetch_prices.py

      - name: Commit en push bijgewerkte prijzen
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "Deinion Saver Bot"
          git config user.email "deinion.saver@gmail.com"
          git diff --quiet dynamic_prices.json || (
            git add dynamic_prices.json &&
            git commit -m "chore: update dynamic prices [$(date -u +'%Y-%m-%d %H:%M') UTC]" &&
            git push
          )

      - name: Stuur e-mail bij mislukking
        if: failure()
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          run_url = f"https://github.com/deinion/deinion-saver-providers/actions"

          body = f"""Hoi,

          Het ophalen van de day-ahead energieprijzen is mislukt op {now}.

          Controleer de GitHub Actions log voor details:
          {run_url}

          De Deinion Saver gebruikt voorlopig de prijzen van de vorige dag.

          — Deinion Saver Bot
          """

          msg = MIMEText(body)
          msg['Subject'] = f'⚠️ Deinion Saver: prijzen ophalen mislukt ({now})'
          msg['From'] = 'deinion.saver@gmail.com'
          msg['To'] = 'deinion.saver@gmail.com'

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login('deinion.saver@gmail.com', os.environ['GMAIL_APP_PASSWORD'])
              smtp.send_message(msg)

          print("✅ E-mail verstuurd naar deinion.saver@gmail.com")
          EOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
